<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaHands - Mix Colors with Your Hands</title>
    <link rel="stylesheet" href="css/landing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container" id="bg-container">
        <!-- Animated orbs will be here via CSS -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="content">
        <header>
            <h1 class="title">Chroma<span>Hands</span></h1>
            <p class="tagline">Mix colors with your physical gestures</p>
        </header>

        <section class="cta">
            <button id="enter-btn" class="enter-btn" disabled>
                <span id="btn-label">Loading Models…</span>
                <div class="btn-glow"></div>
            </button>
            <p class="hint" id="load-status">Downloading MediaPipe &amp; hand tracking models…</p>
        </section>
    </main>

    <script>
        const btn       = document.getElementById('enter-btn');
        const statusEl  = document.getElementById('load-status');
        const labelEl   = document.getElementById('btn-label');

        // Track which assets are done
        const loadState = { mediapipe: false, three: false };

        function checkAllLoaded() {
            if (loadState.mediapipe && loadState.three) {
                btn.disabled = false;
                btn.classList.add('ready');
                labelEl.textContent = 'Enter Experience';
                statusEl.textContent = 'All systems ready — click to begin!';
                btn.addEventListener('click', () => {
                    window.location.href = 'scene.html';
                });
            }
        }

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        // ── 1. Load Three.js (ESM module — just fetch the bundle to warm the cache) ──
        setStatus('Loading 3D engine (Three.js)…');
        fetch('https://unpkg.com/three@0.160.0/build/three.module.js')
            .then(r => {
                if (!r.ok) throw new Error('Three.js fetch failed');
                return r.text(); // read body to fully cache
            })
            .then(() => {
                loadState.three = true;
                if (!loadState.mediapipe) setStatus('Loading MediaPipe hand models…');
                checkAllLoaded();
            })
            .catch(err => {
                console.warn('Three.js preload failed (non-fatal):', err);
                // Still allow entry — the scene will try itself
                loadState.three = true;
                checkAllLoaded();
            });

        // ── 2. Load MediaPipe Hands scripts, then warm the WASM/model ──
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src;
                s.crossOrigin = 'anonymous';
                s.onload  = resolve;
                s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        async function loadMediaPipe() {
            try {
                setStatus('Loading MediaPipe scripts…');
                await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js');
                await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js');
                await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js');

                setStatus('Warming up hand-tracking model (WASM)…');

                // Create a temporary off-screen video + Hands instance to force
                // MediaPipe to download the WASM binary and model files.
                const tempVideo = document.createElement('video');
                tempVideo.width  = 64;
                tempVideo.height = 64;

                const hands = new Hands({
                    locateFile: (file) =>
                        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });

                // onResults fires once the model is downloaded & initialised
                await new Promise((resolve) => {
                    hands.onResults(resolve);

                    // We need at least one `send()` to trigger the WASM load.
                    // Use a tiny blank canvas instead of a real video frame.
                    const offCanvas = document.createElement('canvas');
                    offCanvas.width  = 64;
                    offCanvas.height = 64;
                    const ctx = offCanvas.getContext('2d');
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, 64, 64);

                    // Keep sending until we get a response (model ready)
                    let sent = false;
                    const tick = async () => {
                        if (!sent) {
                            sent = true;
                            try { await hands.send({ image: offCanvas }); } catch(_) {}
                            sent = false;
                        }
                    };
                    const interval = setInterval(tick, 300);

                    // Safety timeout — if model doesn't fire within 30 s, proceed anyway
                    const timeout = setTimeout(() => {
                        clearInterval(interval);
                        resolve();
                    }, 30000);

                    // Wrap resolve to clear timers
                    hands.onResults(() => {
                        clearInterval(interval);
                        clearTimeout(timeout);
                        resolve();
                    });
                });

                loadState.mediapipe = true;
                if (!loadState.three) setStatus('Almost there — finishing 3D engine…');
                checkAllLoaded();

            } catch (err) {
                console.error('MediaPipe preload error:', err);
                setStatus('Model preload failed — entering anyway…');
                loadState.mediapipe = true;
                checkAllLoaded();
            }
        }

        loadMediaPipe();
    </script>
</body>
</html>
