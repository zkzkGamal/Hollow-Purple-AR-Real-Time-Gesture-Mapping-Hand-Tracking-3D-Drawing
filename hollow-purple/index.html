<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>虚式・茈 — Hollow Purple</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body { background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }

    /* 3D Effects Layer (Transparent) */
    #three-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
    }

    /* Video + Hand Skeleton Layer */
    #debug-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      background: #000;
    }

    #webcam { display: none; }

    #webcam-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
      z-index: 2; pointer-events: none;
    }

    /* ── Start screen ── */
    #start-screen{
      position:fixed;inset:0;z-index:100;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
      background:radial-gradient(ellipse at center,#0d001a 0%,#000 70%);
    }
    #start-screen h1{
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(28px,5vw,60px);
      color:#cc44ff;
      text-shadow:0 0 30px #9900ff,0 0 70px #6600cc,0 0 120px #440088;
      text-align:center;letter-spacing:.1em;
    }
    #start-screen h1 span{
      display:block;font-size:.38em;color:rgba(255,255,255,.5);
      letter-spacing:.3em;margin-top:10px;font-family:'Inter',sans-serif;font-weight:300;
    }
    .instr{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:580px}
    .icard{
      display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:12px;padding:10px 18px;font-size:13px;color:rgba(255,255,255,.7);
    }
    .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
    #start-btn{
      padding:14px 52px;font-size:15px;letter-spacing:.1em;
      background:linear-gradient(135deg,#6600cc,#9900ff);
      color:#fff;border:none;border-radius:50px;cursor:pointer;
      box-shadow:0 0 30px rgba(153,0,255,.5);transition:transform .2s,box-shadow .2s;
    }
    #start-btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(153,0,255,.8)}

    /* ── HUD chips ── */
    #hud{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);
      z-index:10;display:none;gap:16px;
    }
    .chip{
      display:flex;align-items:center;gap:8px;
      background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.1);
      border-radius:20px;padding:5px 15px;font-size:12px;color:rgba(255,255,255,.6);
      transition:opacity .3s;pointer-events:none;
    }
    .chip.off{opacity:.2}
    .hd{width:8px;height:8px;border-radius:50%}
    .hd-b{background:#33aaff;box-shadow:0 0 5px #33aaff}
    .hd-r{background:#ff3355;box-shadow:0 0 5px #ff3355}

    /* ── Hollow Purple big text ── */
    #hp-text{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(22px,5.5vw,72px);
      letter-spacing:.15em;color:#cc44ff;
      text-shadow:0 0 30px #9900ff,0 0 60px #6600cc,0 0 120px #440088;
      opacity:0;pointer-events:none;z-index:20;white-space:nowrap;
    }

    /* ── Status ── */
    #status{
      position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
      z-index:10;font-size:11px;color:rgba(255,255,255,.3);
      background:rgba(0,0,0,.4);border-radius:10px;padding:4px 12px;
      pointer-events:none;display:none;
    }
    #hint{
      position:fixed;bottom:18px;right:18px;z-index:10;
      font-size:10px;color:rgba(255,255,255,.2);pointer-events:none;display:none;
    }
  </style>
</head>
<body>
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="debug-canvas"></canvas>
  <div id="webcam-overlay"></div>
  <canvas id="three-canvas"></canvas>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>虚式・茈<span>HOLLOW PURPLE</span></h1>
    <div class="instr">
      <div class="icard"><div class="dot" style="background:#33aaff;box-shadow:0 0 6px #33aaff"></div>Right hand → Lapse Blue</div>
      <div class="icard"><div class="dot" style="background:#ff3355;box-shadow:0 0 6px #ff3355"></div>Left hand → Reversal Red</div>
      <div class="icard"><div class="dot" style="background:#cc44ff;box-shadow:0 0 6px #cc44ff"></div>Bring together → Hollow Purple</div>
    </div>
    <button id="start-btn">⚡ Activate Camera</button>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none;flex-direction:row">
    <div class="chip off" id="chip-l"><div class="hd hd-r"></div>RED</div>
    <div class="chip off" id="chip-r"><div class="hd hd-b"></div>BLUE</div>
  </div>

  <div id="hp-text">HOLLOW PURPLE</div>
  <div id="status">⚡ Initialising hand tracking…</div>
  <div id="hint">D = debug · F = fullscreen</div>

  <!-- MediaPipe Hands + Drawing Utils -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>

  <!-- Three.js importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
